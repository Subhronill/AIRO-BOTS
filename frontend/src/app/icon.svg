<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square matching navbar logo -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>

  <!-- CPU outer box -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="none" stroke="white" stroke-width="2"/>

  <!-- CPU inner chip -->
  <rect x="12.5" y="12.5" width="7" height="7" rx="1" fill="white" opacity="0.95"/>

  <!-- Top pins -->
  <line x1="12" y1="6" x2="12" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="6" x2="16" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="6" x2="20" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bottom pins -->
  <line x1="12" y1="23" x2="12" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="23" x2="20" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left pins -->
  <line x1="6" y1="12" x2="9" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="16" x2="9" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="20" x2="9" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right pins -->
  <line x1="23" y1="12" x2="26" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="26" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="20" x2="26" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
