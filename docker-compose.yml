version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airobots-db
    environment:
      POSTGRES_USER: airo
      POSTGRES_PASSWORD: airo_pass
      POSTGRES_DB: airobots
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airo -d airobots"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airobots-api
    environment:
      DATABASE_URL: postgresql://airo:airo_pass@postgres:5432/airobots
      JWT_SECRET: airo-bots-super-secret-jwt-key-docker-2024
      JWT_REFRESH_SECRET: airo-bots-refresh-secret-docker-2024
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: airobots-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
